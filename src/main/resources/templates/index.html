<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>智慧商品信息管理系统</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Microsoft YaHei',Arial,sans-serif; }
        .header {
            background:#2c3e50; color:white; padding:12px 30px;
            display:flex; justify-content:space-between; align-items:center;
            height:56px; position:fixed; top:0; left:0; right:0; z-index:100;
        }
        .header h1 { font-size:18px; }
        .header h1 span { color:#5dade2; }
        .header .user-info { display:flex; align-items:center; gap:16px; font-size:14px; }
        .header .user-info a { color:#f1c40f; text-decoration:none; }
        .sidebar {
            position:fixed; top:56px; left:0; bottom:0; width:180px;
            background:#fff; border-right:1px solid #e4e7ec; padding:16px 0;
        }
        .sidebar ul { list-style:none; padding:0; }
        .sidebar ul li { padding:0 12px; }
        .sidebar ul li a {
            display:block; padding:10px 16px; border-radius:6px;
            color:#3d4a5c; text-decoration:none; font-size:14px;
        }
        .sidebar ul li a:hover { background:#eef2f7; }
        .content { margin-left:180px; margin-top:56px; height:calc(100vh - 56px); }
        .content iframe { width:100%; height:100%; border:none; background:#f0f2f5; }
    </style>
</head>
<body>
<div class="header">
    <h1>智慧<span>商品</span>信息管理系统</h1>
    <div class="user-info">
        <span sec:authentication="name">admin</span>
        <a th:href="@{/logout}">退出</a>
    </div>
</div>
<div class="sidebar">
    <ul>
        <li><a href="/welcome" target="mainFrame">欢迎</a></li>
        <li><a href="/product/list" target="mainFrame">商品管理</a></li>
        <li sec:authorize="hasRole('ROLE_admin')">
            <a href="/category/list" target="mainFrame">分类管理</a>
        </li>
    </ul>
</div>
<div class="content">
    <iframe name="mainFrame" src="/welcome"></iframe>
</div>

<script>
    // ★★★ 终极方案：检测页面加载类型 ★★★
    (function() {
        // 如果页面是通过前进/后退加载的（type === 2）
        if (window.performance && window.performance.navigation) {
            if (window.performance.navigation.type === 2) {
                // 强制跳转到登录页，并携带 expired 参数
                window.location.href = '/login?expired=true';
                return;
            }
        }

        // 页面加载时检查登录状态
        function checkLogin() {
            fetch('/index', { method: 'HEAD' })
                .then(response => {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '/login';
                    }
                })
                .catch(() => {
                    window.location.href = '/login';
                });
        }

        // 从 bfcache 恢复时强制刷新
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // 页面重新可见时检查
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                checkLogin();
            }
        });
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧商品管理系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fa;
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
        }
        .login-container {
            background: #ffffff;
            padding: 48px 40px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            width: 380px;
            max-width: 92%;
            text-align: center;
            border: 1px solid #e8ecf1;
        }
        .login-container h2 {
            margin-bottom: 32px;
            color: #1e2a3a;
            font-weight: 600;
            font-size: 26px;
            letter-spacing: 2px;
        }
        .login-container h2 span {
            color: #2c6bff;
        }
        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #3d4a5c;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d9dfe8;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            background: #fafbfc;
        }
        .form-group input:focus {
            border-color: #2c6bff;
            box-shadow: 0 0 0 3px rgba(44, 107, 255, 0.08);
            background: #ffffff;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #1e2a3a;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
            letter-spacing: 1px;
        }
        .btn-login:hover {
            background: #2c3e50;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: #d32f2f;
            background: #fef2f2;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 18px;
            font-size: 14px;
            border: 1px solid #fde2e2;
            text-align: center;
        }
        .success-msg {
            color: #0f7b3a;
            background: #eafcf1;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 18px;
            font-size: 14px;
            border: 1px solid #c8f0d6;
            text-align: center;
        }
        .footer {
            margin-top: 24px;
            color: #8896a8;
            font-size: 13px;
            border-top: 1px solid #edf2f7;
            padding-top: 18px;
        }
        .btn-register-link {
            display: inline-block;
            margin-top: 15px;
            color: #2c6bff;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>智慧<span>商品</span>管理系统</h2>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn-login">登 录</button>

        <div th:if="${param.error}" class="error-msg">用户名或密码错误，请重新输入</div>
        <div th:if="${param.logout}" class="success-msg">您已成功退出</div>
    </form>

    <a class="btn-register-link" th:href="@{/register}">还没有账号？立即注册</a>

    <div class="footer">
        默认账号 admin / 密码 123456
    </div>
</div>
</body>
</html>

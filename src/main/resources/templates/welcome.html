<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- ★ 禁用所有缓存 ★ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>欢迎</title>
    <style>
        body {
            display:flex; justify-content:center; align-items:center;
            height:100vh; margin:0; font-family:'Microsoft YaHei',Arial,sans-serif;
            background:#f0f2f5;
        }
        .box {
            text-align:center; background:#fff; padding:60px 80px;
            border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.06);
        }
        .box h2 { font-size:28px; color:#1e2a3a; }
        .box h2 span { color:#2c6bff; }
        .box p { color:#8896a8; font-size:16px; margin-top:6px; }
        .box .tips { margin-top:20px; padding-top:20px; border-top:1px solid #eef0f4; color:#3d4a5c; font-size:14px; }
        .box .tips span { background:#eef2f7; padding:4px 14px; border-radius:12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>👋 欢迎登录 <span>智慧商品</span>信息管理系统</h2>
    <p>请通过左侧菜单进行操作</p>
    <div class="tips">📌 点击 <span>商品管理</span> 管理商品 &nbsp;|&nbsp; 点击 <span>分类管理</span> 管理分类</div>
</div>

<!-- ★★★ 关键修复：页面加载时主动检查登录状态 ★★★ -->
<script>
    (function() {
        // 1. 页面加载时立即检查登录状态
        function checkLogin() {
            fetch('/index', { method: 'HEAD' })
                .then(response => {
                    // 如果返回 401/403，说明未登录
                    if (response.status === 401 || response.status === 403) {
                        window.top.location.href = '/login';
                    }
                })
                .catch(() => {
                    window.top.location.href = '/login';
                });
        }

        // 立即执行
        checkLogin();

        // 2. 从 bfcache 恢复时强制刷新
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // 3. 页面可见性变化时再次检查（用户从其他标签页切回来）
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                checkLogin();
            }
        });
    })();
</script>
</body>
</html>

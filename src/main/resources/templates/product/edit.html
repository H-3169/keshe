<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑商品</title>
    <style>
        body { font-family:'Microsoft YaHei',Arial,sans-serif; background:#f0f2f5; padding:30px; }
        .box { max-width:500px; margin:0 auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
        h2 { border-left:4px solid #2c6bff; padding-left:12px; }
        .form-group { margin-bottom:14px; }
        label { display:block; font-weight:500; color:#3d4a5c; margin-bottom:4px; }
        input, select { width:100%; padding:8px 12px; border:1px solid #d9dfe8; border-radius:6px; font-size:14px; outline:none; }
        input:focus, select:focus { border-color:#2c6bff; }
        .btn { padding:8px 24px; background:#2c6bff; color:#fff; border:none; border-radius:6px; cursor:pointer; }
        .btn:hover { background:#1a56d9; }
        .back { margin-left:10px; color:#8896a8; text-decoration:none; }
        .current-img { margin:8px 0; }
        .current-img img { max-height:80px; border-radius:6px; border:1px solid #eef0f4; }
    </style>
</head>
<body>
<div class="box">
    <h2>编辑商品</h2>
    <form th:action="@{/product/edit}" method="post">
        <input type="hidden" name="id" th:value="${product.id}">
        <div class="form-group">
            <label>名称</label>
            <input type="text" name="name" th:value="${product.name}" required>
        </div>
        <div class="form-group">
            <label>价格</label>
            <input type="number" step="0.01" name="price" th:value="${product.price}" required>
        </div>
        <div class="form-group">
            <label>描述</label>
            <input type="text" name="descp" th:value="${product.descp}">
        </div>
        <div class="form-group">
            <label>图片路径</label>
            <div class="current-img">
                <img th:src="${product.photoUrl}" alt="当前图片" th:if="${product.photoUrl != null and product.photoUrl != ''}">
                <span th:unless="${product.photoUrl != null and product.photoUrl != ''}" style="color:#8896a8;">暂无图片</span>
            </div>
            <input type="text" name="photoUrl" th:value="${product.photoUrl}" placeholder="修改图片路径，如 /img/p1.jpg">
        </div>
        <div class="form-group">
            <label>发布日期</label>
            <input type="date" name="releaseDate" th:value="${product.releaseDate != null ? #dates.format(product.releaseDate, 'yyyy-MM-dd') : ''}">
        </div>
        <div class="form-group">
            <label>分类</label>
            <select name="catId" required>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${product.catId == c.id}"></option>
            </select>
        </div>
        <button class="btn" type="submit">保存</button>
        <a class="back" th:href="@{/product/list}">返回</a>
    </form>
</div>
</body>
</html>
